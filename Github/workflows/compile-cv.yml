name: Compile CV

on:
  push:
    branches: [master]
    paths:
      - 'CV_Cheick_Ba/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase on latest master
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin master
          git rebase origin/master

      - name: Compile LaTeX (EN)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_1page.tex
          working_directory: CV_Cheick_Ba
          latexmk_use_xelatex: true

      - name: Compile LaTeX (IT)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_1page_translated.tex
          working_directory: CV_Cheick_Ba
          latexmk_use_xelatex: true

      - name: Move PDFs to docs
        run: |
          mv CV_Cheick_Ba/cv_1page.pdf docs/cv/CV_Cheick_Ba_latest.pdf
          mv CV_Cheick_Ba/cv_1page_translated.pdf docs/cv/CV_Cheick_Ba_latest_IT.pdf

      - name: Commit compiled PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: recompile CV PDFs"
          file_pattern: docs/cv/CV_Cheick_Ba_latest.pdf docs/cv/CV_Cheick_Ba_latest_IT.pdf
